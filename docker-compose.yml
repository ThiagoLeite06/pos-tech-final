networks:
  sus-network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: sus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: susreceita
      POSTGRES_USER: susreceita
      POSTGRES_PASSWORD: susreceita123
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U susreceita -d susreceita"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sus-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: sus-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    #healthcheck:
    #  test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
    #  interval: 10s
    #  timeout: 5s
    #  retries: 5
    networks:
      - sus-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sus-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sus-network

  kafka-create-topics:
    image: confluentinc/cp-kafka:7.6.1
    container_name: init-kafka-topics
    depends_on:
      kafka:
        condition: service_healthy
    command: |
      cub kafka-ready -b kafka:9092 1 20;
      
      kafka-topics --create --if-not-exists \
        --topic PRESCRIPTION.REQUEST \
        --bootstrap-server kafka:9092 \
        --partitions 1 \
        --replication-factor 1;
      
      kafka-topics --create --if-not-exists \
        --topic PRESCRIPTION.STATUS \
        --bootstrap-server kafka:9092 \
        --partitions 1 \
        --replication-factor 1;
      

      "
    networks:
      - sus-network
    restart: no

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: sus-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    environment:
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - sus-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: sus-auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: susreceita
      DB_USER: susreceita
      DB_PASSWORD: susreceita123
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - sus-network

  prescription-service:
    build:
      context: .
      dockerfile: prescription-service/Dockerfile
    container_name: sus-prescription-service
    ports:
      - "8082:8082"
    depends_on:
      kafka-create-topics:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: susreceita
      DB_USER: susreceita
      DB_PASSWORD: susreceita123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - sus-network